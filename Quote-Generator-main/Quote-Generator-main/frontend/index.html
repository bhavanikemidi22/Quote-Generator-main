<!DOCTYPE html>
<html>
<head>
    <title>Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Quote Generator</h1>

    <div class="quote-box">
        <p id="quote">Click Generate Quote</p>
        <h3 id="author"></h3>
    </div>

    <button id="generateBtn">
        Generate Quote
    </button>

    <h2>Quote History</h2>

    <div id="history"></div>

</div>

<script src="script.js"></script>
</body>
</html>
